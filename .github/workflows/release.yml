name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Build
        run: chmod +x gradlew && ./gradlew build -Pmod_version=${{ steps.meta.outputs.version }}

      - name: Upload mod jar
        uses: actions/upload-artifact@v6
        with:
          name: blockheads-client-tweaks-${{ steps.meta.outputs.version }}
          path: build/libs/*[!-sources].jar
          if-no-files-found: error
          retention-days: 90

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5

    steps:
      - name: Download mod jar
        uses: actions/download-artifact@v7
        with:
          name: blockheads-client-tweaks-${{ needs.build.outputs.version }}

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: Blockheads Client Tweaks v${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: "*.jar"
